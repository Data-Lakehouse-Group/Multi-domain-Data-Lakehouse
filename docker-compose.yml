networks:
  lakehouse:
    driver: bridge

volumes:
  minio_data:
  superset_home:

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./minio-data:/data
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      mc mb --ignore-existing local/artifacts;
      mc mb --ignore-existing local/raw;
      echo 'Buckets created: bronze, silver, gold, artifacts, raw';
      exit 0;
      "
    networks:
      - lakehouse

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: lakehouse-dbt
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8001:8001"
    volumes:
      - ./transformations/dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    environment:
      DBT_PROFILES_DIR: ${DBT_PROFILES_DIR}
      DBT_LOG_PATH: ${DBT_LOG_PATH}
      DBT_TARGET_PATH: ${DBT_TARGET_PATH}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE}
    command: uvicorn app:app --host 0.0.0.0 --port 8001
    networks:
      - lakehouse

  # ── Trino Service (Needed for Superset Dashboard) ────
  trino:
    image: trinodb/trino:435
    container_name: trino
    ports:
      - "8082:8080"
    volumes:
      - ./dashboard/trino/etc:/etc/trino
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lakehouse

  # ── Superset init (set up DB and admin user) ────
  superset-init:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset-init
    command: [
        "bash",
        "-c",
        "
        set -e;

        superset db upgrade;

        superset fab create-admin \
        --username ${SUPERSET_ADMIN_USERNAME} \
        --firstname Admin \
        --lastname User \
        --email ${SUPERSET_ADMIN_EMAIL} \
        --password ${SUPERSET_ADMIN_PASSWORD} || true;

        superset init;

        superset set_database_uri \
        --database-name 'Lakehouse (Trino)' \
        --uri 'trino://admin@trino:8080/lakehouse';

        echo 'Setting database perms...';
        python3 /app/superset_db_config.py;

        echo 'Superset init complete';
        ",
      ]
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    volumes:
      - ./dashboard/superset/superset_config.py:/app/superset_config.py
      - ./dashboard/superset/superset_db_config.py:/app/superset_db_config.py
      - ./dashboard/exports:/app/exports
      - ./dashboard/trino/etc:/app/trino/etc
      - superset_home:/app/superset_home
    networks:
      - lakehouse

  # ── Superset app ─────────────────────────────────────────────
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    ports:
      - "8088:8088"
    command: >
      bash -c "
        python3 /app/trino_setup.py &&
        /usr/bin/run-server.sh
      "
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      MINIO_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./dashboard/superset/superset_config.py:/app/superset_config.py
      - ./dashboard/superset/trino_setup.py:/app/trino_setup.py
      - ./dashboard/trino/etc:/app/trino/etc
      - superset_home:/app/superset_home
    depends_on:
      superset-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      trino:
        condition: service_healthy
    networks:
      - lakehouse

  # ── Airflow Metadata Database ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  # ── Initializes Airflow With Default User ─────────────────────────────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: lakehouse-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: [
        "bash",
        "-c",
        "
        airflow db migrate && \
        airflow users create \
        --username ${AIRFLOW_ADMIN_USERNAME} \
        --password ${AIRFLOW_ADMIN_PASSWORD} \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email ${AIRFLOW_ADMIN_EMAIL}
        ",
      ]
    networks:
      - lakehouse

  # ── Airflow UI ─────────────────────────────────────────────
  airflow-webserver:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: lakehouse-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: ""
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
      AIRFLOW__WEBSERVER__LOG_FETCH_TIMEOUT_SEC: 30
      AIRFLOW__WEBSERVER__LOG_FETCH_DELAY_SEC: 2
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      DBT_PROFILES_DIR: /opt/airflow/transformations/dbt
      DBT_PROJECT_DIR: /opt/airflow/transformations/dbt
      DBT_LOG_PATH: /opt/airflow/tmp/dbt_logs
      DBT_TARGET_PATH: /opt/airflow/tmp/dbt_target
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ingestion:/opt/airflow/ingestion
      - ./transformations:/opt/airflow/transformations
      - ./quality:/opt/airflow/quality
    command: webserver
    networks:
      - lakehouse

  # ── Airflow Scheduler For DAGs ─────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: lakehouse-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: ""
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      DBT_PROFILES_DIR: /opt/airflow/transformations/dbt
      DBT_PROJECT_DIR: /opt/airflow/transformations/dbt
      DBT_LOG_PATH: /opt/airflow/tmp/dbt_logs
      DBT_TARGET_PATH: /opt/airflow/tmp/dbt_target
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ingestion:/opt/airflow/ingestion
      - ./transformations:/opt/airflow/transformations
      - ./quality:/opt/airflow/quality
    command: scheduler
    networks:
      - lakehouse
