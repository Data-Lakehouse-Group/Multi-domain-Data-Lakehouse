networks:
  lakehouse:
    driver: bridge

volumes:
  minio_data:

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./minio-data:/data
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      mc mb --ignore-existing local/dbt-artifacts;
      mc mb --ignore-existing local/great-expectations;
      echo 'Buckets created: bronze, silver, gold, dbt-artifacts, great-expectations';
      exit 0;
      "
    networks:
      - lakehouse

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: lakehouse-dbt
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./transformations/dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_REGION: us-east-1
    networks:
      - lakehouse
    entrypoint: ["tail", "-f", "/dev/null"]
