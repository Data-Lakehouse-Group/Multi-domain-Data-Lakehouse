networks:
  lakehouse:
    driver: bridge

volumes:
  minio_data:
  superset_home:
  dbt_tmp:

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./minio-data:/data
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      mc mb --ignore-existing local/artifacts;
      echo 'Buckets created: bronze, silver, gold, artifacts';
      exit 0;
      "
    networks:
      - lakehouse

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: lakehouse-dbt
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./transformations/dbt:/usr/app/dbt
      - dbt_tmp:/tmp
    working_dir: /usr/app/dbt
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      DBT_LOG_PATH: /usr/app/tmp/dbt_logs
      DBT_TARGET_PATH: /usr/app//tmp/dbt_target
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_REGION: us-east-1
      AWS_S3_FORCE_PATH_STYLE: "true"
    networks:
      - lakehouse
    entrypoint: ["tail", "-f", "/dev/null"]

  # ── Superset init (set up DB and admin user) ────
  superset-init:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset-init
    command: [
        "bash",
        "-c",
        "
        set -e;

        superset db upgrade;

        superset fab create-admin \
        --username admin \
        --firstname Admin \
        --lastname User \
        --email admin@gmail.com \
        --password admin || true;

        superset init;

        echo 'Importing dashboards...';

        shopt -s nullglob;
        for f in /app/exports/*.zip; do
        superset import-dashboards -p \"$f\" && echo \"Imported $f\";
        done;

        echo 'Superset init complete';
        ",
      ]
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: supersetSecretKey123
    volumes:
      - ./dashboard/superset/superset_config.py:/app/superset_config.py
      - ./dashboard/exports:/app/exports
      - ./dashboard/superset/duckdb_setup.py:/app/duckdb_setup.py
      - superset_home:/app/superset_home
    networks:
      - lakehouse

  # ── Superset app ─────────────────────────────────────────────
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    ports:
      - "8088:8088"
    command: >
      bash -c "
        python3 /app/duckdb_setup.py &&
        /usr/bin/run-server.sh
      "
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: supersetSecretKey123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./dashboard/superset/superset_config.py:/app/superset_config.py
      - ./dashboard/exports:/app/exports
      - ./dashboard/superset/duckdb_setup.py:/app/duckdb_setup.py
      - superset_home:/app/superset_home
    depends_on:
      superset-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - lakehouse

  # ── Airflow Metadata Database ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  # ── Initializes Airflow With Default User ─────────────────────────────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: lakehouse-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: "lakehouse_secret_key_123"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: [
        "bash",
        "-c",
        "
        airflow db migrate && \
        airflow users create \
        --username admin \
        --password admin \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email admin@lakehouse.com
        ",
      ]
    networks:
      - lakehouse

  # ── Airflow UI ─────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: lakehouse-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: "" # prevents Airflow from overriding pip installs
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: "lakehouse_secret_key_123"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
      AIRFLOW__WEBSERVER__LOG_FETCH_TIMEOUT_SEC: 30 # ← increase timeout
      AIRFLOW__WEBSERVER__LOG_FETCH_DELAY_SEC: 2
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      DBT_PROFILES_DIR: /opt/airflow/transformations/dbt
      DBT_PROJECT_DIR: /opt/airflow/transformations/dbt
      DBT_LOG_PATH: /opt/airflow/tmp/dbt_logs
      DBT_TARGET_PATH: /opt/airflow//tmp/dbt_target
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ingestion:/opt/airflow/ingestion
      - ./transformations:/opt/airflow/transformations
      - ./quality:/opt/airflow/quality
      - ./data:/opt/airflow/data
      - dbt_tmp:/tmp
    command: webserver
    networks:
      - lakehouse

  # ── Airflow Scheduler For DAGs ─────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: lakehouse-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: "" # prevents Airflow from overriding pip installs
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: "lakehouse_secret_key_123"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      DBT_PROFILES_DIR: /opt/airflow/transformations/dbt
      DBT_PROJECT_DIR: /opt/airflow/transformations/dbt
      DBT_LOG_PATH: /opt/airflow/tmp/dbt_logs
      DBT_TARGET_PATH: /opt/airflow//tmp/dbt_target
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ingestion:/opt/airflow/ingestion
      - ./transformations:/opt/airflow/transformations
      - ./quality:/opt/airflow/quality
      - ./data:/opt/airflow/data
      - dbt_tmp:/tmp
    command: scheduler
    networks:
      - lakehouse
