name: multi_domain_lakehouse
version: "1.0.0"
config-version: 2

profile: multi_domain_lakehouse

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  multi_domain_lakehouse:
    staging:
      +materialized: view
      taxi:
        +tags: ["taxi", "staging"]
      github_archive:
        +tags: ["github", "staging"]
      retail:
        +tags: ["retail", "staging"]
      weather:
        +tags: ["weather", "staging"]

    intermediate:
      +materialized: view
      taxi:
        +tags: ["taxi", "intermediate"]
      github_archive:
        +tags: ["github", "intermediate"]
      retail:
        +tags: ["retail", "intermediate"]
      weather:
        +tags: ["weather", "intermediate"]

    gold:
      +materialized: view
      taxi:
        +tags: ["taxi", "gold"]
      github_archive:
        +tags: ["github", "gold"]
      retail:
        +tags: ["retail", "gold"]
      weather:
        +tags: ["weather", "gold"]

seeds:
  multi_domain_lakehouse:
    +schema: seeds
