#***NOTE***
#CHANGE ALL ACCESS CREDENTIALS TO USE ENVIRONMENT VARIABLES
#FOR YOUR OWN CONFIGURED CREDENTIALS

multi_domain_lakehouse:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ":memory:" # DuckDB runs in memory — reads directly from MinIO
      extensions:
        - delta
        - httpfs
      settings:
        s3_region: us-east-1
        s3_access_key_id: minioadmin
        s3_secret_access_key: minioadmin
        s3_endpoint: minio:9000
        s3_use_ssl: false
        s3_url_style: path
        s3_uploader_thread_limit: 1

    docker:
      type: duckdb
      path: "/tmp/lakehouse.duckdb" # Needed for gold_ingestion to read from
      extensions:
        - delta
        - httpfs
      settings:
        s3_region: us-east-1
        s3_access_key_id: minioadmin
        s3_secret_access_key: minioadmin
        s3_endpoint: minio:9000
        s3_use_ssl: false
        s3_url_style: path
        s3_uploader_thread_limit: 1

    prod:
      type: duckdb
      path: "/tmp/lakehouse.duckdb" # Needed for gold_ingestion to read from
      extensions:
        - delta
        - httpfs
      settings:
        s3_region: us-east-1
        # s3_access_key_id: "{{ env_var('MINIO_ACCESS_KEY') }}"
        # s3_secret_access_key: "{{ env_var('MINIO_SECRET_KEY') }}"
        # s3_endpoint: "{{ env_var('MINIO_ENDPOINT') }}"
        s3_access_key_id: minioadmin
        s3_secret_access_key: minioadmin
        s3_endpoint: minio:9000
        s3_use_ssl: false
        s3_url_style: path
