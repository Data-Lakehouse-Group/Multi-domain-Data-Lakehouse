#***NOTE***
#CHANGE ALL ACCESS CREDENTIALS TO USE ENVIRONMENT VARIABLES
#FOR YOUR OWN CONFIGURED CREDENTIALS

multi_domain_lakehouse:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ":memory:" # DuckDB runs in memory — reads directly from MinIO
      extensions:
        - delta
        - httpfs
      settings:
        s3_region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
        s3_access_key_id: "{{ env_var('AWS_ACCESS_KEY_ID', 'minioadmin') }}"
        s3_secret_access_key: "{{ env_var('AWS_SECRET_ACCESS_KEY', 'minioadmin') }}"
        s3_endpoint: "{{ env_var('AWS_ENDPOINT_URL', 'minio:9000') }}"
        s3_use_ssl: false
        s3_url_style: path
        s3_uploader_thread_limit: 1

    docker:
      type: duckdb
      path: "/tmp/lakehouse.duckdb" # Needed for gold_ingestion to read from
      extensions:
        - delta
        - httpfs
      settings:
        s3_region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
        s3_access_key_id: "{{ env_var('AWS_ACCESS_KEY_ID', 'minioadmin') }}"
        s3_secret_access_key: "{{ env_var('AWS_SECRET_ACCESS_KEY', 'minioadmin') }}"
        s3_endpoint: "{{ env_var('AWS_ENDPOINT_URL', 'minio:9000') }}"
        s3_use_ssl: false
        s3_url_style: path
        s3_uploader_thread_limit: 1

    prod:
      type: duckdb
      path: "/tmp/lakehouse.duckdb" # Needed for gold_ingestion to read from
      extensions:
        - delta
        - httpfs
      settings:
        s3_region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
        s3_access_key_id: "{{ env_var('AWS_ACCESS_KEY_ID', 'minioadmin') }}"
        s3_secret_access_key: "{{ env_var('AWS_SECRET_ACCESS_KEY', 'minioadmin') }}"
        s3_endpoint: "{{ env_var('AWS_ENDPOINT_URL', 'minio:9000') }}"
        s3_use_ssl: false
        s3_url_style: path
        s3_uploader_thread_limit: 1